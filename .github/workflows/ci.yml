name: CI

on:
  pull_request:
    branches: ["main", "master"]
  push:
    branches: ["main", "master"]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    env:
      REACT_APP_ADMIN: ${{ vars.REACT_APP_ADMIN }}
      REACT_APP_STORE_NAME: ${{ vars.REACT_APP_STORE_NAME }}
      REACT_APP_STORE_EMAIL: ${{ vars.REACT_APP_STORE_EMAIL }}
      REACT_APP_STORE_PHONE: ${{ vars.REACT_APP_STORE_PHONE }}
      REACT_APP_STORE_WHATSAPP: ${{ vars.REACT_APP_STORE_WHATSAPP }}
      REACT_APP_STORE_ADDRESS: ${{ vars.REACT_APP_STORE_ADDRESS }}
      REACT_APP_API_BASE_URL: ${{ vars.REACT_APP_API_BASE_URL }}
      REACT_APP_API_TIMEOUT: ${{ vars.REACT_APP_API_TIMEOUT }}
      REACT_APP_ENABLE_CART: ${{ vars.REACT_APP_ENABLE_CART }}
      REACT_APP_ENABLE_WISHLIST: ${{ vars.REACT_APP_ENABLE_WISHLIST }}
      REACT_APP_ENABLE_SEARCH: ${{ vars.REACT_APP_ENABLE_SEARCH }}
      REACT_APP_GOOGLE_ANALYTICS_ID: ${{ vars.REACT_APP_GOOGLE_ANALYTICS_ID }}
      REACT_APP_EMAILJS_SERVICE_ID: ${{ secrets.REACT_APP_EMAILJS_SERVICE_ID }}
      REACT_APP_EMAILJS_CONTACT_TEMPLATE_ID: ${{ secrets.REACT_APP_EMAILJS_CONTACT_TEMPLATE_ID }}
      REACT_APP_EMAILJS_AUTO_REPLY_TEMPLATE_ID: ${{ secrets.REACT_APP_EMAILJS_AUTO_REPLY_TEMPLATE_ID }}
      REACT_APP_EMAILJS_PUBLIC_KEY: ${{ secrets.REACT_APP_EMAILJS_PUBLIC_KEY }}
      REACT_APP_APP_VERSION: ${{ vars.REACT_APP_APP_VERSION }}
      REACT_APP_APP_NAME: ${{ vars.REACT_APP_APP_NAME }}
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
